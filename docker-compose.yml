version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: banda_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: banda
      POSTGRES_PASSWORD: password
      POSTGRES_DB: banda_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7.0
    container_name: banda_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: banda
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
